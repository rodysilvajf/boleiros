name: Reset Lista Pelada

on:
  schedule:
    - cron: '0 15 * * 3'
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Buscar dados, pendurar não pagos e resetar lista
        env:
          JSONBIN_ID: ${{ secrets.JSONBIN_ID }}
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, unicodedata, re, os

          BIN_ID = os.environ['JSONBIN_ID']
          API_KEY = os.environ['JSONBIN_KEY']
          BASE_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID

          def normalizar(nome):
              nome = nome.strip().lower()
              nome = unicodedata.normalize('NFD', nome)
              nome = ''.join(c for c in nome if unicodedata.category(c) != 'Mn')
              nome = re.sub(r'\s+', ' ', nome)
              return nome

          def formatar(nome):
              return ' '.join(w.capitalize() for w in nome.strip().split())

          req = urllib.request.Request(BASE_URL + "/latest",
              headers={"X-Master-Key": API_KEY})
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())["record"]

          linha = data.get("linha", [])
          espera = data.get("espera", [])
          convidados = data.get("convidados", [])
          pendurados = data.get("pendurados", [])
          pagos = data.get("pagos", [])

          pagos_norm = [normalizar(p) for p in pagos]
          todos = linha + espera + convidados

          for nome in todos:
              nn = normalizar(nome)
              if nn in pagos_norm:
                  continue
              idx = next((i for i, p in enumerate(pendurados) if normalizar(p["nome"]) == nn), -1)
              if idx == -1:
                  pendurados.append({"nome": formatar(nome), "cor": "amarelo"})
              else:
                  pendurados[idx]["cor"] = "vermelho"

          novo = {"linha": [], "espera": [], "convidados": [], "pendurados": pendurados, "pagos": []}
          body = json.dumps(novo).encode()
          req2 = urllib.request.Request(BASE_URL, data=body, method="PUT",
              headers={"Content-Type": "application/json", "X-Master-Key": API_KEY})
          with urllib.request.urlopen(req2) as r:
              print("Reset concluído:", r.status)
          PYEOF
